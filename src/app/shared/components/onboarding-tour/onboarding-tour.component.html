@if (active() && currentStep(); as step) {
  <div class="fixed inset-0 z-[10000] bg-black/55"></div>

  <div
    class="sk-crt fixed top-1/2 left-1/2 z-[10001] w-[min(92vw,420px)] -translate-x-1/2 -translate-y-1/2"
    role="dialog"
    aria-label="Onboarding tour"
  >
    <div class="sk-crt-titlebar">
      <span class="sk-crt-led"></span>
      <span class="text-xs tracking-[0.2em] uppercase">Agent briefing</span>
      <span class="text-[10px] text-white/45">{{ stepIndex() + 1 }} / {{ steps.length }}</span>
    </div>
    <div class="sk-crt-body">
      <h2 class="m-0 mb-2 text-sm tracking-wide text-white">{{ step.title }}</h2>
      <p class="m-0 mb-4 text-xs leading-relaxed text-white/80">{{ step.body }}</p>
      <div class="flex justify-end gap-2">
        <button type="button" class="sk-btn px-3 py-1.5 text-xs" (click)="skip()">Skip tour</button>
        <button type="button" class="sk-btn px-3 py-1.5 text-xs" (click)="next()">
          {{ isLast() ? 'Finish' : 'Next' }}
        </button>
      </div>
    </div>
  </div>
}
