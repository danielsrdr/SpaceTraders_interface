<div
  class="relative min-h-screen bg-cover bg-no-repeat"
  [style.background-image]="background.backgroundImage()"
>
  <audio loop hidden>
    <source src="/assets/sounds/skamkraft_main_theme.mp3" type="audio/mpeg" />
  </audio>
  <app-side-nav />
  @if (!onlineStatus.online()) {
    <div
      class="fixed top-0 right-0 left-0 z-[9997] bg-amber-600/90 py-1 text-center text-xs font-medium text-black"
    >
      Offline — cached codex, dashboard and spectate remain available where cached.
    </div>
  }
  @if (pwaInstall.canInstall() && !pwaInstall.installed()) {
    <button
      type="button"
      class="fixed bottom-4 right-4 z-[9996] rounded-full border border-cyan-400/40 bg-black/80 px-4 py-2 text-xs tracking-[0.12em] text-cyan-200 uppercase shadow-lg backdrop-blur"
      (click)="installApp()"
    >
      Install app
    </button>
  }
  <main class="sk-shell-main m-0 h-screen w-full p-0">
    <router-outlet />
  </main>
  <app-snackbar />
  <app-confirm-dialog />
  <app-logbook-drawer />
  <app-command-palette />
  <app-keyboard-help-overlay />
  <app-notification-center />
  <app-onboarding-tour />
</div>
