@if (agentStore.isAuthenticated()) {
  <nav
    class="sk-rail"
    [class.sk-rail--expanded]="expanded()"
    [class.sk-rail--pinned]="pinned()"
    aria-label="Primary navigation"
  >
    <div class="sk-rail-header">
      <button
        type="button"
        class="sk-rail-pin"
        [attr.aria-pressed]="pinned()"
        aria-label="Pin navigation rail"
        (click)="togglePin()"
      >
        <svg class="sk-rail-pin-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path
            fill="currentColor"
            d="M16 3v2h2.3L12 11.3 5.7 5H8V3H4v4h2.3L4 13.3 5.7 15 12 8.7l6.3 6.3L20 13.3 17.7 11 20 8.7V3h-4z"
          />
        </svg>
      </button>
    </div>

    @for (section of sections(); track section.id) {
      <div class="sk-rail-section">
        <p class="sk-rail-section-label">{{ section.label }}</p>
        @for (item of section.items; track item.id) {
          <button
            type="button"
            class="sk-rail-item"
            [class.sk-rail-item--active]="isActive(item)"
            [class.sk-rail-item--locked]="item.locked"
            [title]="item.locked ? item.unlockHint : item.label"
            [attr.aria-label]="item.label + (item.locked ? ' (locked)' : '')"
            (click)="onItemClick(item, $event)"
          >
            <span class="sk-rail-icon">
              <app-nav-icon [name]="item.locked ? 'locked' : item.icon" />
            </span>
            <span class="sk-rail-label">{{ item.label }}</span>
            @if (item.badge && item.badge > 0 && !item.locked) {
              <span
                class="sk-nav-badge"
                [class.sk-nav-badge--warn]="item.badgeKind === 'warn'"
                [class.sk-nav-badge--good]="item.badgeKind === 'good'"
              >
                {{ item.badge > 99 ? '99+' : item.badge }}
              </span>
            } @else if (item.activity && !item.locked) {
              <span
                class="sk-nav-dot"
                [class.sk-nav-dot--warn]="item.activityKind === 'warn'"
                aria-hidden="true"
              ></span>
            }
          </button>
        }
      </div>
    }
  </nav>
}
