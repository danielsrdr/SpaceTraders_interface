@if (options()) {
  <div class="fixed inset-0 z-[9998] bg-black/70" (click)="onClose()"></div>
  <div
    class="fixed top-1/2 left-1/2 z-[9999] w-[min(96vw,860px)] -translate-x-1/2 -translate-y-1/2 rounded-[10px] border-2 border-emerald-400 bg-black/95 p-4 text-white"
  >
    <div class="mb-3 flex items-center gap-2">
      <h2 class="m-0 flex-1 font-display text-lg tracking-widest text-emerald-300 uppercase">Surface Stamp</h2>
      <button type="button" class="sk-btn px-2 py-1 text-xs" (click)="onClose()">Close</button>
    </div>

    <div class="relative overflow-hidden rounded-[8px] border border-white/15 bg-black">
      @if (busy()) {
        <div class="flex aspect-[1200/630] items-center justify-center">
          <p class="text-sm tracking-widest text-white/70 uppercase">Stamping logbook…</p>
        </div>
      } @else if (dataUrl(); as url) {
        <img [src]="url" alt="Generated surface stamp" class="block w-full" />
      } @else {
        <div class="flex aspect-[1200/630] items-center justify-center">
          <p class="text-sm text-white/60">No stamp to show.</p>
        </div>
      }
    </div>

    <div class="mt-3 flex flex-wrap justify-end gap-2">
      <button type="button" class="sk-btn text-sm" [disabled]="!dataUrl()" (click)="download()">
        Download PNG
      </button>
      <button type="button" class="sk-btn text-sm" [disabled]="!dataUrl()" (click)="copy()">Copy</button>
      @if (canShareFiles()) {
        <button type="button" class="sk-btn text-sm" [disabled]="!dataUrl()" (click)="share()">
          Share
        </button>
      }
    </div>
  </div>
}
