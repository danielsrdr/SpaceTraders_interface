@if (agentStore.isAuthenticated()) {
  <nav
    class="sk-wheel"
    [attr.data-open]="open()"
    (mouseenter)="open.set(true)"
    (mouseleave)="open.set(false)"
    (focusin)="open.set(true)"
    (focusout)="onFocusOut($event)"
    aria-label="Primary navigation"
  >
    <button
      type="button"
      class="sk-wheel-hub"
      [attr.aria-expanded]="open()"
      aria-label="Toggle navigation menu"
      (click)="toggle()"
    >
      <svg class="sk-wheel-helm" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <circle cx="32" cy="32" r="21" fill="none" stroke="currentColor" stroke-width="3" />
        <circle cx="32" cy="32" r="6.5" fill="none" stroke="currentColor" stroke-width="3" />
        <circle cx="32" cy="32" r="2.5" fill="currentColor" />
        <g stroke="currentColor" stroke-width="3" stroke-linecap="round">
          <line x1="32" y1="2.5" x2="32" y2="15" />
          <line x1="32" y1="49" x2="32" y2="61.5" />
          <line x1="2.5" y1="32" x2="15" y2="32" />
          <line x1="49" y1="32" x2="61.5" y2="32" />
          <line x1="11" y1="11" x2="19.8" y2="19.8" />
          <line x1="44.2" y1="44.2" x2="53" y2="53" />
          <line x1="53" y1="11" x2="44.2" y2="19.8" />
          <line x1="19.8" y1="44.2" x2="11" y2="53" />
        </g>
      </svg>
      @if (hasActivity() && !open()) {
        <span class="sk-nav-dot sk-nav-dot--hub" aria-hidden="true"></span>
      }
    </button>

    <div class="sk-wheel-items">
      @for (item of items(); track item.id; let i = $index) {
        <button
          type="button"
          class="sk-wheel-item"
          [class.sk-wheel-item--locked]="item.locked"
          [style.--angle]="angleFor(i) + 'deg'"
          [style.--i]="i"
          [attr.tabindex]="open() ? 0 : -1"
          [attr.aria-hidden]="!open()"
          [attr.aria-label]="item.label + (item.locked ? ' (locked)' : '')"
          [title]="item.locked ? item.unlockHint : item.label"
          (click)="onItemClick(item, $event)"
        >
          <span class="sk-wheel-icon">
            <app-nav-icon [name]="item.locked ? 'locked' : item.icon" />
          </span>
          @if (item.activity && !item.locked) {
            <span
              class="sk-nav-dot"
              [class.sk-nav-dot--warn]="item.activityKind === 'warn'"
              aria-hidden="true"
            ></span>
          }
          <span class="sk-wheel-label">{{ item.label }}</span>
        </button>
      }
    </div>
  </nav>
}
